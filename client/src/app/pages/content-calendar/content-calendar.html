<div class="feature-page">
  <div class="feature-hero" style="--accent:#6366F1">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">◫</span>
    <h1 class="feature-hero__title">Content Calendar</h1>
    <p class="feature-hero__sub">Plan, schedule, and auto-publish across YouTube, Instagram, and TikTok — all from one visual calendar.</p>
    <button class="feature-hero__btn">Open Calendar</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#6366F122,#6366F144)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
