<div class="feature-page">
  <div class="feature-hero" style="--accent:#14B8A6">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">♫</span>
    <h1 class="feature-hero__title">Music Library</h1>
    <p class="feature-hero__sub">100,000+ royalty-free tracks, beats, and stems — search by mood, genre, or BPM. Use freely on any platform.</p>
    <button class="feature-hero__btn">Browse Tracks</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#14B8A622,#14B8A644)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
