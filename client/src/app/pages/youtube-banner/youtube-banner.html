<div class="feature-page">
  <div class="feature-hero" style="--accent:#EF4444">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">▶</span>
    <h1 class="feature-hero__title">YouTube Banner</h1>
    <p class="feature-hero__sub">Design channel art that stops the scroll — perfect 2560×1440px dimensions, every time.</p>
    <button class="feature-hero__btn">Create Banner</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#EF444422,#EF444444)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
