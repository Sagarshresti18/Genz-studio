<div class="chatbox-demo-container">
    <div class="header-wrapper">
        <div class="logo-wrapper">
            <img src="https://4say.site/claude.png" alt="Logo" />
        </div>
        <h1 class="greeting-title">
            {{ greeting }}, <span class="name-highlight">
                {{ userName }}
                <svg
                    viewBox="0 0 140 24"
                    fill="none"
                    preserveAspectRatio="none"
                    aria-hidden="true"
                >
                    <path
                        d="M6 16 Q 70 24, 134 14"
                        stroke="currentColor"
                        stroke-width="3"
                        stroke-linecap="round"
                        fill="none"
                    />
                </svg>
            </span>
        </h1>
    </div>

    <app-claude-chat-input (sendMessage)="handleSendMessage($event)"></app-claude-chat-input>

    <div class="suggestion-chips">
        <button class="chip-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
            Write
        </button>
        <button class="chip-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c0 2.5 6 2.5 6 2.5s6 0 6-2.5v-5" />
            </svg>
            Learn
        </button>
        <button class="chip-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" />
            </svg>
            Code
        </button>
        <button class="chip-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Life stuff
        </button>
    </div>
</div>
