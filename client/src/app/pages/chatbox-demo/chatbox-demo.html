<div class="min-h-screen w-full bg-[#fcfcf9] dark:bg-[#202123] flex flex-col items-center justify-center p-4 font-sans text-text-100 transition-colors duration-200">
    <div class="w-full max-w-3xl mb-8 sm:mb-12 text-center animate-fade-in">
        <div class="w-24 h-24 mx-auto mb-6 flex items-center justify-center">
            <img src="https://4say.site/claude.png" alt="Logo" class="w-full h-full object-contain" />
        </div>
        <h1 class="text-3xl sm:text-4xl font-serif font-light text-text-200 mb-3 tracking-tight">
            {{ greeting }}, <span class="relative inline-block pb-2">
                {{ userName }}
                <svg
                    class="absolute w-[140%] h-[20px] -bottom-1 -left-[5%] text-[#D97757]"
                    viewBox="0 0 140 24"
                    fill="none"
                    preserveAspectRatio="none"
                    aria-hidden="true"
                >
                    <path
                        d="M6 16 Q 70 24, 134 14"
                        stroke="currentColor"
                        stroke-width="3"
                        stroke-linecap="round"
                        fill="none"
                    />
                </svg>
            </span>
        </h1>
    </div>

    <app-claude-chat-input (sendMessage)="handleSendMessage($event)"></app-claude-chat-input>

    <div class="flex flex-wrap justify-center gap-2 mt-4 max-w-2xl mx-auto px-4">
        <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-text-300 bg-transparent border border-bg-300 dark:border-bg-300/50 rounded-full hover:bg-bg-200 hover:text-text-200 transition-colors duration-150">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
            Write
        </button>
        <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-text-300 bg-transparent border border-bg-300 dark:border-bg-300/50 rounded-full hover:bg-bg-200 hover:text-text-200 transition-colors duration-150">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c0 2.5 6 2.5 6 2.5s6 0 6-2.5v-5" />
            </svg>
            Learn
        </button>
        <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-text-300 bg-transparent border border-bg-300 dark:border-bg-300/50 rounded-full hover:bg-bg-200 hover:text-text-200 transition-colors duration-150">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" />
            </svg>
            Code
        </button>
        <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm text-text-300 bg-transparent border border-bg-300 dark:border-bg-300/50 rounded-full hover:bg-bg-200 hover:text-text-200 transition-colors duration-150">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Life stuff
        </button>
    </div>
</div>
