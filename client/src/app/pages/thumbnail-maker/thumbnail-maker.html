<div class="feature-page">
  <div class="feature-hero" style="--accent:#F97316">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">▣</span>
    <h1 class="feature-hero__title">Thumbnail Maker</h1>
    <p class="feature-hero__sub">High-CTR thumbnails with AI face enhancement, bold text overlays, and proven viral layouts.</p>
    <button class="feature-hero__btn">Make Thumbnail</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#F9731622,#F9731644)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
