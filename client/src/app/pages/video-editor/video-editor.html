<div class="feature-page">
  <div class="feature-hero" style="--accent:#F59E0B">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">⬡</span>
    <h1 class="feature-hero__title">Video Editor</h1>
    <p class="feature-hero__sub">Cut, trim, add captions and effects — a full timeline editor built for creators, no experience needed.</p>
    <button class="feature-hero__btn">Start Editing</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#F59E0B22,#F59E0B44)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
