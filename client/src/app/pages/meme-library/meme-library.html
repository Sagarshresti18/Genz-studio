<div class="feature-page">
  <div class="feature-hero" style="--accent:#FBBF24">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">😂</span>
    <h1 class="feature-hero__title">Meme Library</h1>
    <p class="feature-hero__sub">Browse thousands of trending meme templates, remix with AI-generated captions, and publish instantly.</p>
    <button class="feature-hero__btn">Browse Memes</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#FBBF2422,#FBBF2444)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
