<div class="projects page-enter">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header__left">
      <h1 class="page-title">Projects</h1>
      <p class="page-subtitle">View and manage all your visual assets in one place.</p>
    </div>
    <div class="page-header__right">
      <button class="btn btn-primary" routerLink="/app/projects">+ New Project</button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar glass-card">
    <div class="filter-search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" placeholder="Search projects..." />
    </div>

    <div class="filter-dropdowns">
      <select class="filter-select">
        <option>All Statuses</option>
        <option>Active</option>
        <option>Draft</option>
        <option>Published</option>
      </select>

      <select class="filter-select">
        <option>Sort by: Recent</option>
        <option>Sort by: Name</option>
      </select>
    </div>
  </div>

  <!-- Projects Grid -->
  <div class="projects-grid">
    @for (project of projects(); track project.id) {
      <div class="project-card glass-card">
        <div class="project-thumbnail" [style.background]="project.gradient">
          <div class="project-overlay">
            <button class="btn btn-primary btn-sm">Open Editor</button>
          </div>
        </div>
        <div class="project-footer">
          <div class="project-info">
            <span class="project-name">{{ project.name }}</span>
            <span class="project-time">{{ project.timestamp }}</span>
          </div>
          <div class="project-actions">
            <span class="status-indicator" [class]="'status-indicator--' + project.status.toLowerCase()"></span>
            <span class="status-label">{{ project.status }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</div>
