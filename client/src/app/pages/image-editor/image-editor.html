<div class="feature-page">
  <div class="feature-hero" style="--accent:#06B6D4">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">✦</span>
    <h1 class="feature-hero__title">Image Editor</h1>
    <p class="feature-hero__sub">Professional-grade editing with AI tools — remove backgrounds, enhance quality, and retouch in one click.</p>
    <button class="feature-hero__btn">Open Editor</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#06B6D422,#06B6D444)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
