<div class="editor-workspace">
  <!-- Top Header Bar -->
  <header class="editor-header">
    <div class="header-left">
      <div class="brand">GZ</div>
      <nav class="menu-bar">
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
        <button class="menu-item" (click)="fileInput.click()">Open Image</button>
        <button class="menu-item">Edit</button>
        <button class="menu-item">Image</button>
        <button class="menu-item">Layer</button>
        <button class="menu-item">Filter</button>
        <button class="menu-item">View</button>
      </nav>
    </div>
    
    <div class="header-center">
      <span class="document-name">{{fileName}} @ {{zoomLevel}}%</span>
    </div>

    <div class="header-right">
      <div class="zoom-controls">
        <button class="icon-btn" (click)="zoomOut()">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6M7 10h6"/></svg>
        </button>
        <span class="zoom-text">{{zoomLevel}}%</span>
        <button class="icon-btn" (click)="zoomIn()">
           <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6M7 10h6"/></svg>
        </button>
      </div>
      <button class="export-btn" (click)="exportImage()" [disabled]="!imageLoaded">Export</button>
    </div>
  </header>

  <div class="editor-body">
    <!-- Left Toolbar -->
    <aside class="toolbar-left">
      <div class="tools-group">
        <button class="tool-btn" 
                *ngFor="let tool of tools"
                [class.active]="activeTool === tool.id"
                (click)="setTool(tool.id)"
                [title]="tool.name">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path [attr.d]="tool.icon" />
          </svg>
        </button>
      </div>
      <div class="color-picker-group">
        <div class="color-swatch foreground" style="background: #0f172a;"></div>
        <div class="color-swatch background" style="background: #ffffff;"></div>
        <button class="swap-colors-btn">
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main Canvas Area -->
    <main class="canvas-area">
      <div class="canvas-ruler ruler-h"></div>
      <div class="canvas-ruler ruler-v"></div>
      
      <div class="canvas-container" *ngIf="imageLoaded; else emptyState">
        <div class="canvas-wrapper" [style.transform]="'scale(' + zoomLevel/100 + ')'">
          <canvas #imageCanvas class="real-canvas"></canvas>
        </div>
      </div>
      
      <ng-template #emptyState>
        <div class="empty-state">
          <div class="empty-state-content">
            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" style="margin: 0 auto 16px; display: block; opacity: 0.5;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p>No image open</p>
            <button class="upload-btn" (click)="fileInput.click()">Open an Image</button>
          </div>
        </div>
      </ng-template>
    </main>

    <!-- Right Sidebar (Panels) -->
    <aside class="panel-right">
      
      <!-- Adjustments Panel -->
      <div class="panel-section">
        <div class="panel-header">
          <h3>Adjustments</h3>
          <button class="icon-btn"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        </div>
        <div class="panel-content">
          <div class="slider-group">
            <label>Brightness <span>{{adjustments.brightness}}%</span></label>
            <input type="range" min="0" max="200" [(ngModel)]="adjustments.brightness" (ngModelChange)="applyFilters()" class="gz-slider" [disabled]="!imageLoaded">
          </div>
          <div class="slider-group">
            <label>Contrast <span>{{adjustments.contrast}}%</span></label>
            <input type="range" min="0" max="200" [(ngModel)]="adjustments.contrast" (ngModelChange)="applyFilters()" class="gz-slider" [disabled]="!imageLoaded">
          </div>
          <div class="slider-group">
            <label>Saturation <span>{{adjustments.saturation}}%</span></label>
            <input type="range" min="0" max="200" [(ngModel)]="adjustments.saturation" (ngModelChange)="applyFilters()" class="gz-slider" [disabled]="!imageLoaded">
          </div>
        </div>
      </div>

      <!-- Layers Panel -->
      <div class="panel-section layers-section">
        <div class="panel-header">
          <h3>Layers</h3>
          <div class="panel-actions">
            <button class="icon-btn" title="New Layer"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 5v14M5 12h14"/></svg></button>
            <button class="icon-btn" title="Delete Layer"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
          </div>
        </div>
        <div class="panel-content layers-list">
          
          <div class="layer-item" 
               *ngFor="let layer of layers" 
               [class.active]="layer.active"
               (click)="setActiveLayer(layer)">
            
            <button class="layer-visibility" (click)="toggleLayerVisibility(layer); $event.stopPropagation()">
              <svg *ngIf="layer.visible" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="!layer.visible" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>
            </button>
            
            <div class="layer-thumb">
              <svg *ngIf="layer.type === 'text'" viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
              <svg *ngIf="layer.type === 'effect'" viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg *ngIf="layer.type === 'image'" viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
            
            <span class="layer-name">{{layer.name}}</span>
          </div>

        </div>
      </div>
      
    </aside>
  </div>
</div>
