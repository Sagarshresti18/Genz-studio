<div class="feature-page">
  <div class="feature-hero" style="--accent:#EC4899">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">◉</span>
    <span class="feature-hero__badge">Coming Soon</span>
    <h1 class="feature-hero__title">AI Video Generator</h1>
    <p class="feature-hero__sub">Turn text prompts into cinematic video clips — no camera, no crew, no editing skills needed.</p>
    <button class="feature-hero__btn">Join Waitlist</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#EC489922,#EC489944)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
