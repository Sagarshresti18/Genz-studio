<div class="feature-page">
  <div class="feature-hero" style="--accent:#10B981">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">✧</span>
    <h1 class="feature-hero__title">AI Content Generator</h1>
    <p class="feature-hero__sub">Scripts, hooks, captions, blog posts — generate viral content with one prompt. Built for creators who move fast.</p>
    <button class="feature-hero__btn">Generate Content</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#10B98122,#10B98144)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
