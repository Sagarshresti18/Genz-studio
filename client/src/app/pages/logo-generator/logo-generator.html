<div class="feature-page">
  <div class="feature-hero" style="--accent:#8B5CF6">
    <div class="feature-hero__glow"></div>
    <span class="feature-hero__icon">◈</span>
    <h1 class="feature-hero__title">Logo Generator</h1>
    <p class="feature-hero__sub">Describe your brand and get a unique, professional logo in seconds — powered by AI.</p>
    <button class="feature-hero__btn">Generate Logo</button>
  </div>
  <div class="feature-placeholder">
    <div class="ph-card" *ngFor="let i of items">
      <div class="ph-thumb" style="background:linear-gradient(135deg,#8B5CF622,#8B5CF644)"></div>
      <div class="ph-line ph-line--lg"></div>
      <div class="ph-line ph-line--sm"></div>
    </div>
  </div>
</div>
