<div #containerRef class="morph-hero-container"
     (wheel)="onWheel($event)"
     (touchstart)="onTouchStart($event)"
     (touchmove)="onTouchMove($event)"
     (mousemove)="onMouseMove($event)">
    
    <div class="stage-wrapper">
        
        <!-- Intro Text -->
        <div class="intro-text-block"
             [style.opacity]="introOpacity"
             [style.filter]="introFilter">
            <h1 class="intro-title">
                The future is built on AI.
            </h1>
            <p class="intro-subtitle" [style.opacity]="introSubtitleOpacity">
                SCROLL TO EXPLORE
            </p>
        </div>

        <!-- Arc Active Content -->
        <div class="active-content-block"
             [style.opacity]="contentOpacity"
             [style.transform]="'translateY(' + contentY + 'px)'">
            <h2 class="content-title">
                Explore Our Vision
            </h2>
            <p class="content-desc">
                Discover a world where technology meets creativity. <br class="md-only-br" />
                Scroll through our curated collection of innovations designed to shape the future.
            </p>
        </div>

        <!-- Main Container -->
        <div class="cards-wrapper">
            <div *ngFor="let src of images; let i = index"
                 class="image-card-item"
                 [style.transform]="'translate3d(' + currentTransforms[i].x + 'px, ' + currentTransforms[i].y + 'px, 0) rotate(' + currentTransforms[i].rotation + 'deg) scale(' + currentTransforms[i].scale + ')'"
                 [style.opacity]="currentTransforms[i].opacity">
                 
                <div class="card-flipper">
                    <!-- Front Face -->
                    <div class="card-face-front">
                        <img [src]="src" alt="hero-{{i}}" class="card-img" />
                        <div class="image-overlay"></div>
                    </div>

                    <!-- Back Face -->
                    <div class="card-face-back">
                        <div class="back-text-wrap">
                            <p class="back-tag">View</p>
                            <p class="back-title">Details</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
