<div class="relative w-full max-w-2xl mx-auto transition-all duration-300 font-sans"
     (dragover)="onDragOver($event)"
     (dragleave)="onDragLeave($event)"
     (drop)="onDrop($event)">

    <div class="!box-content flex flex-col mx-2 md:mx-0 items-stretch transition-all duration-200 relative z-10 rounded-2xl cursor-text border border-bg-300 dark:border-transparent shadow-[0_0_15px_rgba(0,0,0,0.08)] hover:shadow-[0_0_20px_rgba(0,0,0,0.12)] focus-within:shadow-[0_0_25px_rgba(0,0,0,0.15)] bg-white dark:bg-[#30302E] font-sans antialiased">
        <div class="flex flex-col px-3 pt-3 pb-2 gap-2">
            <!-- Uploaded Files & Pasted Content Preview -->
            <div *ngIf="files.length > 0 || pastedContent.length > 0" class="flex gap-3 overflow-x-auto custom-scrollbar pb-2 px-1">
                <!-- Pasted Content -->
                <div *ngFor="let content of pastedContent" class="relative group flex-shrink-0 w-28 h-28 rounded-2xl overflow-hidden border border-[#E5E5E5] dark:border-[#30302E] bg-white dark:bg-[#20201F] animate-fade-in p-3 flex flex-col justify-between shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
                    <div class="overflow-hidden w-full">
                        <p class="text-[10px] text-[#9CA3AF] leading-[1.4] font-mono break-words whitespace-pre-wrap line-clamp-4 select-none">{{ content.content }}</p>
                    </div>
                    <div class="flex items-center justify-between w-full mt-2">
                        <div class="inline-flex items-center justify-center px-1.5 py-[2px] rounded border border-[#E5E5E5] dark:border-[#404040] bg-white dark:bg-transparent">
                            <span class="text-[9px] font-bold text-[#6B7280] dark:text-[#9CA3AF] uppercase tracking-wider font-sans">PASTED</span>
                        </div>
                    </div>
                    <button (click)="removePastedContent(content.id)" class="absolute top-2 right-2 p-[3px] bg-white dark:bg-[#30302E] border border-[#E5E5E5] dark:border-[#404040] rounded-full text-[#9CA3AF] hover:text-[#6B7280] dark:hover:text-white transition-colors shadow-sm opacity-0 group-hover:opacity-100">
                        <svg class="w-2 h-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
                <!-- File Preview -->
                <div *ngFor="let file of files" class="relative group flex-shrink-0 w-24 h-24 rounded-xl overflow-hidden border border-bg-300 bg-bg-200 animate-fade-in transition-all hover:border-text-400">
                    <ng-container *ngIf="file.preview; else noPreview">
                        <div class="w-full h-full relative">
                            <img [src]="file.preview" [alt]="file.file.name" class="w-full h-full object-cover" />
                            <div class="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-colors"></div>
                        </div>
                    </ng-container>
                    <ng-template #noPreview>
                        <div class="w-full h-full p-3 flex flex-col justify-between">
                            <div class="flex items-center gap-2">
                                <div class="p-1.5 bg-bg-300 rounded">
                                    <svg class="w-4 h-4 text-text-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                </div>
                                <span class="text-[10px] font-medium text-text-400 uppercase tracking-wider truncate">
                                    {{ file.file.name.split('.').pop() }}
                                </span>
                            </div>
                            <div class="space-y-0.5">
                                <p class="text-xs font-medium text-text-200 truncate" [title]="file.file.name">{{ file.file.name }}</p>
                                <p class="text-[10px] text-text-500">{{ formatFileSize(file.file.size) }}</p>
                            </div>
                        </div>
                    </ng-template>

                    <button (click)="removeFile(file.id)" class="absolute top-1 right-1 p-1 bg-black/50 hover:bg-black/70 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>

                    <div *ngIf="file.uploadStatus === 'uploading'" class="absolute inset-0 bg-black/40 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    </div>
                </div>
            </div>

            <!-- Textarea -->
            <div class="relative mb-1">
                <div class="max-h-96 w-full overflow-y-auto custom-scrollbar font-sans break-words transition-opacity duration-200 min-h-[2.5rem] pl-1">
                    <textarea #textareaRef
                              [(ngModel)]="message"
                              (ngModelChange)="onMessageChange()"
                              (paste)="handlePaste($event)"
                              (keydown)="handleKeyDown($event)"
                              placeholder="How can I help you today?"
                              class="w-full bg-transparent border-0 outline-none text-text-100 text-[16px] placeholder:text-text-400 resize-none overflow-hidden py-0 leading-relaxed block font-normal antialiased"
                              rows="1"
                              style="min-height: 1.5em;"></textarea>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="flex gap-2 w-full items-center">
                <div class="relative flex-1 flex items-center shrink min-w-0 gap-1">
                    <button (click)="triggerFileInput()" class="inline-flex items-center justify-center relative shrink-0 transition-colors duration-200 h-8 w-8 rounded-lg active:scale-95 text-text-400 hover:text-text-200 hover:bg-bg-200" type="button" aria-label="Add file">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>

                    <div class="flex shrink min-w-8 !shrink-0">
                        <button (click)="isThinkingEnabled = !isThinkingEnabled" 
                                [ngClass]="isThinkingEnabled ? 'text-accent bg-accent/10' : 'text-text-400 hover:text-text-200 hover:bg-bg-200'"
                                class="transition-all duration-200 h-8 w-8 flex items-center justify-center rounded-lg active:scale-95" type="button" aria-label="Extended thinking">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M10.3857 2.50977C14.3486 2.71054 17.5 5.98724 17.5 10C17.5 14.1421 14.1421 17.5 10 17.5C5.85786 17.5 2.5 14.1421 2.5 10C2.5 9.72386 2.72386 9.5 3 9.5C3.27614 9.5 3.5 9.72386 3.5 10C3.5 13.5899 6.41015 16.5 10 16.5C13.5899 16.5 16.5 13.5899 16.5 10C16.5 6.5225 13.7691 3.68312 10.335 3.50879L10 3.5L9.89941 3.49023C9.67145 3.44371 9.5 3.24171 9.5 3C9.5 2.72386 9.72386 2.5 10 2.5L10.3857 2.50977ZM10 5.5C10.2761 5.5 10.5 5.72386 10.5 6V9.69043L13.2236 11.0527C13.4706 11.1762 13.5708 11.4766 13.4473 11.7236C13.3392 11.9397 13.0957 12.0435 12.8711 11.9834L12.7764 11.9473L9.77637 10.4473C9.60698 10.3626 9.5 10.1894 9.5 10V6C9.5 5.72386 9.72386 5.5 10 5.5ZM3.66211 6.94141C4.0273 6.94159 4.32303 7.23735 4.32324 7.60254C4.32324 7.96791 4.02743 8.26446 3.66211 8.26465C3.29663 8.26465 3 7.96802 3 7.60254C3.00021 7.23723 3.29676 6.94141 3.66211 6.94141ZM4.95605 4.29395C5.32146 4.29404 5.61719 4.59063 5.61719 4.95605C5.6171 5.3214 5.3214 5.61709 4.95605 5.61719C4.59063 5.61719 4.29403 5.32146 4.29395 4.95605C4.29395 4.59057 4.59057 4.29395 4.95605 4.29395ZM7.60254 3C7.96802 3 8.26465 3.29663 8.26465 3.66211C8.26446 4.02743 7.96791 4.32324 7.60254 4.32324C7.23736 4.32302 6.94159 4.0273 6.94141 3.66211C6.94141 3.29676 7.23724 3.00022 7.60254 3Z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="flex flex-row items-center min-w-0 gap-1">
                    <!-- Model Selector -->
                    <div class="shrink-0 p-1 -m-1 relative">
                        <button (click)="toggleDropdown($event)"
                                [ngClass]="isModelDropdownOpen ? 'bg-bg-200 text-text-100 dark:bg-[#454540] dark:text-[#ECECEC]' : 'text-text-300 hover:text-text-200 hover:bg-bg-200 dark:text-[#B4B4B4] dark:hover:text-[#ECECEC] dark:hover:bg-[#454540]'"
                                class="inline-flex items-center justify-center relative shrink-0 transition font-base duration-300 ease-[cubic-bezier(0.165,0.85,0.45,1)] h-8 rounded-xl px-3 min-w-[4rem] active:scale-[0.98] whitespace-nowrap !text-xs pl-2.5 pr-2 gap-1">
                            <div class="font-ui inline-flex gap-[3px] text-[14px] h-[14px] leading-none items-baseline">
                                <div class="flex items-center gap-[4px]">
                                    <div class="whitespace-nowrap select-none font-medium">{{ currentModel.name }}</div>
                                </div>
                            </div>
                            <div class="flex items-center justify-center opacity-75" style="width: 20px; height: 20px;">
                                <svg class="shrink-0 opacity-75 transition-transform duration-200" [ngClass]="{'rotate-180': isModelDropdownOpen}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                        </button>

                        <div *ngIf="isModelDropdownOpen" (click)="$event.stopPropagation()" class="absolute bottom-full right-0 mb-2 w-[260px] bg-white dark:bg-[#212121] border border-[#DDDDDD] dark:border-[#30302E] rounded-2xl shadow-2xl overflow-hidden z-50 flex flex-col p-1.5 animate-fade-in origin-bottom-right">
                            <button *ngFor="let model of models" (click)="selectModel(model.id)" class="w-full text-left px-3 py-2.5 rounded-xl flex items-start justify-between group transition-colors hover:bg-bg-200 dark:hover:bg-[#30302E]">
                                <div class="flex flex-col gap-0.5">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[13px] font-semibold text-text-100 dark:text-[#ECECEC]">{{ model.name }}</span>
                                        <span *ngIf="model.badge" [ngClass]="model.badge === 'Upgrade' ? 'border-blue-200 text-blue-600 bg-white dark:border-blue-500/30 dark:text-blue-400 dark:bg-blue-500/10' : 'border-bg-300 text-text-300'" class="px-1.5 py-[1px] rounded-full text-[10px] font-medium border">{{ model.badge }}</span>
                                    </div>
                                    <span class="text-[11px] text-text-300 dark:text-[#999999]">{{ model.description }}</span>
                                </div>
                                <svg *ngIf="selectedModel === model.id" class="w-4 h-4 text-blue-600 dark:text-blue-400 mt-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <div class="h-px bg-bg-300 dark:bg-[#30302E] my-1 mx-2"></div>
                            <button class="w-full text-left px-3 py-2.5 rounded-xl flex items-center justify-between group transition-colors hover:bg-bg-200 dark:hover:bg-[#30302E] text-text-100 dark:text-[#ECECEC]">
                                <span class="text-[13px] font-semibold">More models</span>
                                <svg class="w-4 h-4 -rotate-90 text-text-300 dark:text-[#999999]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <button (click)="handleSend()" [disabled]="!hasContent" [ngClass]="hasContent ? 'bg-accent text-bg-0 hover:bg-accent-hover shadow-md' : 'bg-accent/30 text-bg-0/60 cursor-default'" class="inline-flex items-center justify-center relative shrink-0 transition-colors h-8 w-8 rounded-md active:scale-95 !rounded-xl !h-8 !w-8" type="button" aria-label="Send message">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Drag overlay -->
    <div *ngIf="isDragging" class="absolute inset-0 bg-bg-200/90 border-2 border-dashed border-accent rounded-2xl z-50 flex flex-col items-center justify-center backdrop-blur-sm pointer-events-none">
        <svg class="w-10 h-10 text-accent mb-2 animate-bounce" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        <p class="text-accent font-medium">Drop files to upload</p>
    </div>

    <input #fileInputRef type="file" multiple class="hidden" (change)="onFileSelected($event)" />

    <div class="text-center mt-4">
        <p class="text-xs text-text-500">AI can make mistakes. Please check important information.</p>
    </div>
</div>

<div *ngIf="isModelDropdownOpen" (click)="isModelDropdownOpen = false" class="fixed inset-0 z-40"></div>
